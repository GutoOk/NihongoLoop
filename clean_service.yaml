apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nihongo-loop-worker
  labels:
    cloud.googleapis.com/location: us-east1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '1'
        autoscaling.knative.dev/minScale: '1'
        run.googleapis.com/cpu-throttling: 'false'
    spec:
      containerConcurrency: 1
      containers:
      - image: IMAGE_PLACEHOLDER
        name: worker
        ports:
        - containerPort: 3000
          name: http1
        env:
        - name: NODE_ENV
          value: production
        - name: AI_WORKER_ONLY
          value: 'true'
        - name: AI_WORKER_GLOBAL_CONCURRENCY
          value: '8'
        - name: AI_WORKER_USER_CONCURRENCY
          value: '4'
        - name: AI_WORKER_TRANSLATE_CONCURRENCY
          value: '4'
        - name: AI_WORKER_READING_CONCURRENCY
          value: '2'
        - name: AI_WORKER_TERMS_CONCURRENCY
          value: '1'
        - name: AI_WORKER_DICTIONARY_CONCURRENCY
          value: '1'
        - name: AI_WORKER_POLL_MS
          value: '2000'
        - name: AI_WORKER_LEASE_SECONDS
          value: '300'
        - name: VITE_SUPABASE_URL
          value: https://khuamwmecnszdvcbcmto.supabase.co
        - name: SUPABASE_SERVICE_ROLE_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-service-role-key
              key: latest
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: latest
        - name: INTERNAL_HEALTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: internal-health-token
              key: latest
        - name: GEMINI_MODEL
          value: gemini-2.5-flash-lite
        - name: GEMINI_MODEL_FAST
          value: gemini-2.5-flash-lite
        - name: GEMINI_MODEL_ANALYZE
          value: gemini-2.5-flash-lite
        - name: APP_VERSION
          value: APP_VERSION_PLACEHOLDER
        resources:
          limits:
            cpu: '1'
            memory: 2Gi
      timeoutSeconds: 3600
  traffic:
  - latestRevision: true
    percent: 100
