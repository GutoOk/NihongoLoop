name: Validate and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Mobile e2e
        env:
          VITE_E2E_AUTH_BYPASS: 'true'
          VITE_E2E_DATA_MOCK: 'true'
        run: npm run test:e2e:mobile

      - name: Validate frontend Supabase configuration
        env:
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          test -n "$VITE_SUPABASE_ANON_KEY" || {
            echo "Missing GitHub secret SUPABASE_ANON_KEY."
            exit 1
          }

      - name: Build application
        env:
          VITE_APP_VERSION: ${{ github.run_number }}-${{ github.sha }}
          VITE_SUPABASE_URL: https://khuamwmecnszdvcbcmto.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_E2E_AUTH_BYPASS: 'false'
          VITE_E2E_DATA_MOCK: 'false'
        run: npm run build

      - name: Verify built frontend configuration
        run: |
          if ! grep -R "https://khuamwmecnszdvcbcmto.supabase.co" dist/assets dist/index.html >/dev/null; then
            echo "Supabase URL was not embedded in the frontend build."
            exit 1
          fi
          if grep -R "SUPABASE_SERVICE_ROLE_KEY\|GEMINI_API_KEY\|VITE_MASTER_PASSWORD" dist/assets dist/index.html >/dev/null; then
            echo "Private configuration leaked into frontend build."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Google Cloud
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/nihongo-loop:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy Cloud Run services
        env:
          IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/nihongo-loop:${{ github.sha }}
          APP_VERSION: ${{ github.run_number }}-${{ github.sha }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" service.yaml clean_service.yaml
          sed -i "s|APP_VERSION_PLACEHOLDER|$APP_VERSION|g" service.yaml clean_service.yaml
          gcloud run services replace service.yaml --region us-east1 --project ${{ secrets.GCP_PROJECT_ID }}
          gcloud run services replace clean_service.yaml --region us-east1 --project ${{ secrets.GCP_PROJECT_ID }}
          DEPLOYER_SA="$(gcloud auth list --filter=status:ACTIVE --format='value(account)')"
          gcloud run services add-iam-policy-binding nihongo-loop-worker \
            --region us-east1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --member="serviceAccount:$DEPLOYER_SA" \
            --role="roles/run.invoker"

      - name: Verify deployed web commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          SERVICE_URL="$(gcloud run services describe nihongo-loop-web --region us-east1 --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"
          echo "Verifying $SERVICE_URL"
          for attempt in 1 2 3 4 5 6; do
            RESPONSE="$(curl -fsS "$SERVICE_URL/api/version" || true)"
            echo "Attempt $attempt: $RESPONSE"
            if echo "$RESPONSE" | grep -q "$EXPECTED_SHA"; then
              exit 0
            fi
            sleep 10
          done
          echo "Cloud Run web did not report expected commit $EXPECTED_SHA"
          exit 1

      - name: Verify worker health
        env:
          INTERNAL_HEALTH_TOKEN: ${{ secrets.INTERNAL_HEALTH_TOKEN }}
        run: |
          WORKER_URL="$(gcloud run services describe nihongo-loop-worker --region us-east1 --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.url)')"
          REVISION="$(gcloud run services describe nihongo-loop-worker --region us-east1 --project ${{ secrets.GCP_PROJECT_ID }} --format='value(status.latestReadyRevisionName)')"

          for attempt in 1 2 3 4 5 6; do
            IDENTITY_TOKEN="$(gcloud auth print-identity-token --audiences="$WORKER_URL")"
            RESPONSE_FILE="$(mktemp)"
            HTTP_CODE="$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
              -H "Authorization: Bearer $IDENTITY_TOKEN" \
              -H "x-internal-health-token: $INTERNAL_HEALTH_TOKEN" \
              "$WORKER_URL/api/queue-health")"

            echo "Worker health HTTP status: $HTTP_CODE (attempt $attempt/6)"
            cat "$RESPONSE_FILE"

            if [ "$HTTP_CODE" = "200" ]; then
              exit 0
            fi

            sleep 10
          done

          echo "Revision: $REVISION"
          gcloud run revisions describe "$REVISION" \
            --region us-east1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='yaml(status.conditions,status.logUri)'

          gcloud logging read \
            "resource.type=cloud_run_revision AND resource.labels.service_name=nihongo-loop-worker" \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --limit=50 \
            --format='value(textPayload)'

          exit 1
