apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nihongo-loop-web
  labels:
    cloud.googleapis.com/location: us-east1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '3'
        autoscaling.knative.dev/minScale: '0'
        run.googleapis.com/cpu-throttling: 'true'
    spec:
      containerConcurrency: 80
      containers:
      - image: IMAGE_PLACEHOLDER
        name: web
        ports:
        - containerPort: 3000
          name: http1
        env:
        - name: NODE_ENV
          value: production
        - name: AI_WORKER_ONLY
          value: 'false'
        - name: VITE_E2E_AUTH_BYPASS
          value: 'false'
        - name: VITE_E2E_DATA_MOCK
          value: 'false'
        - name: ALLOW_AUTH_BYPASS
          value: 'false'
        - name: VITE_SUPABASE_URL
          value: https://khuamwmecnszdvcbcmto.supabase.co
        - name: VITE_SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: supabase-anon-key
              key: latest
        - name: APP_VERSION
          value: APP_VERSION_PLACEHOLDER
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
      timeoutSeconds: 300
  traffic:
  - latestRevision: true
    percent: 100
